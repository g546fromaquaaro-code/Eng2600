<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<title>ことばの宝石箱 - 英単語アプリ</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<style>
/* ======================================================================
   design tokens
   Subject: 中学1年生 英単語カード学習。コルクボードに単語カードを
   ピン留めして集めていくイメージ。マスキングテープ×カードのモチーフを
   全体のシグネチャーにする。
   ====================================================================== */
:root{
  --bg-a:#f6e8f2;
  --bg-b:#ece6fa;
  --bg-c:#e2ecfb;
  --paper:#ffffff;
  --paper-shadow:rgba(120,90,140,.16);
  --ink:#4a3d5c;
  --ink-soft:#9a8bb0;
  --grape:#a78bfa;
  --grape-dark:#8b6cf0;
  --tangerine:#f9a8c9;
  --leaf:#7dd3c0;
  --coral:#f28ba8;
  --sky:#93c5fd;
  --tape-a:#fbcfe8;
  --tape-b:#c7e8e0;
  --tape-c:#ddd6fe;
  --radius-card:24px;
  --font-jp:"Hiragino Maru Gothic ProN","BIZ UDGothic","Yu Gothic UI",sans-serif;
  --font-en:"Arial Rounded MT Bold","Helvetica Neue",sans-serif;
  --shadow-pop: 0 6px 0 rgba(150,120,180,.12), 0 14px 26px rgba(150,110,170,.16);
  --shadow-soft: 0 8px 22px rgba(150,110,170,.14);
}
:root[data-theme="dark"]{
  --bg-a:#2a2138;
  --bg-b:#241f33;
  --bg-c:#1e2030;
  --paper:#332b45;
  --paper-shadow:rgba(0,0,0,.45);
  --ink:#f3edfa;
  --ink-soft:#b8a8d0;
}
*{box-sizing:border-box; -webkit-tap-highlight-color: transparent; -webkit-touch-callout:none;}
html,body{
  height:100%;
  width:100%;
  margin:0;
  position:fixed;
  inset:0;
  overflow:hidden;
  overscroll-behavior:none;
  touch-action:none; /* ピンチズーム・横スワイプなどを禁止 */
}
body{
  font-family:var(--font-jp);
  color:var(--ink);
  background:
    radial-gradient(circle at 18% 12%, rgba(255,255,255,.55), transparent 40%),
    radial-gradient(circle at 85% 80%, rgba(255,255,255,.35), transparent 45%),
    radial-gradient(rgba(255,255,255,.5) 1.2px, transparent 1.6px),
    linear-gradient(160deg, var(--bg-a) 0%, var(--bg-b) 50%, var(--bg-c) 100%);
  background-size:auto, auto, 26px 26px, auto;
  background-attachment:fixed;
  user-select:none;
  -webkit-user-select:none;
}
#app{
  max-width:520px;
  margin:0 auto;
  position:absolute;
  inset:0;
  overflow-y:auto;
  overscroll-behavior:contain; /* 端まで行っても外側にバウンドしない */
  -webkit-overflow-scrolling:touch;
  touch-action:pan-y; /* 縦スクロールだけ許可（拡大・横移動は禁止） */
  padding-bottom:24px;
}
button{font-family:inherit; -webkit-appearance:none; border:none; background:none; cursor:pointer;}
.screen{
  padding:18px 16px 90px;
  animation: screenIn .35s cubic-bezier(.2,.9,.3,1.2);
}
@keyframes screenIn{
  from{opacity:0; transform:translateY(14px) scale(.98);}
  to{opacity:1; transform:translateY(0) scale(1);}
}
.hidden{display:none !important;}

/* ---------- corkboard header / topbar ---------- */
.topbar{
  display:flex; align-items:center; justify-content:space-between;
  padding:14px 16px 6px;
}
.topbar .back-btn{
  width:40px;height:40px;border-radius:50%;
  background:var(--paper); box-shadow:var(--shadow-pop);
  display:flex;align-items:center;justify-content:center; font-size:18px;
}
.topbar .title{font-weight:800; font-size:17px; letter-spacing:.02em;}
.topbar .spacer{width:40px;}

/* ---------- pinned card (signature element) ---------- */
.pin-card{
  position:relative;
  background:var(--paper);
  border-radius:var(--radius-card);
  box-shadow:var(--shadow-soft);
  border:1px solid rgba(255,255,255,.5);
  padding:18px;
  margin:14px 4px;
}
.pin-card::before{ /* washi tape */
  content:"";
  position:absolute; top:-14px; left:18px;
  width:70px; height:26px;
  background:var(--tape-color, var(--tape-a));
  opacity:.85;
  transform:rotate(-6deg);
  border-radius:3px;
  box-shadow:0 2px 4px rgba(0,0,0,.12);
}
.pin-card.tilt-l{transform:rotate(-1.4deg);}
.pin-card.tilt-r{transform:rotate(1.2deg);}

/* ---------- home ---------- */
.hero{
  text-align:center; padding:24px 10px 8px; color:var(--ink);
}
.hero h1{
  font-size:26px; margin:0 0 6px; font-weight:900;
  letter-spacing:.03em;
  background:linear-gradient(90deg,#c084fc,#f472b6,#fb923c);
  -webkit-background-clip:text; background-clip:text;
  -webkit-text-fill-color:transparent;
}
.hero p{margin:0; font-size:12.5px; color:var(--ink-soft); letter-spacing:.06em;}

.stat-row{display:flex; gap:10px; margin:12px 4px;}
.stat-chip{
  flex:1; background:var(--paper); border-radius:18px; padding:12px 8px;
  text-align:center; box-shadow:var(--shadow-soft);
  border:1.5px solid rgba(255,255,255,.9);
}
.stat-chip .num{font-size:20px; font-weight:900; color:var(--grape-dark);}
.stat-chip .lbl{font-size:11px; color:var(--ink-soft); margin-top:2px;}

.xp-bar-wrap{margin:8px 4px 4px;}
.xp-bar-bg{
  background:rgba(255,255,255,.7); border-radius:20px; height:16px; overflow:hidden;
  box-shadow:inset 0 2px 4px rgba(150,110,170,.18);
}
.xp-bar-fill{
  height:100%; background:linear-gradient(90deg, #f9a8c9, #c084fc);
  border-radius:20px; transition:width .6s cubic-bezier(.2,.9,.3,1.2);
}
.xp-label{font-size:11px; color:var(--ink-soft); margin-top:4px; text-align:right;}

.big-btn{
  display:block; width:100%; text-align:center;
  padding:16px; border-radius:22px; font-weight:800; font-size:16px;
  color:#fff; box-shadow: 0 6px 0 rgba(150,110,170,.22);
  transition:transform .08s;
  margin:12px 4px;
}
.big-btn:active{transform:translateY(5px); box-shadow:0 1px 0 rgba(150,110,170,.22);}
.big-btn.grape{background:linear-gradient(135deg, #c4a5ff, #a78bfa);}
.big-btn.tangerine{background:linear-gradient(135deg, #fbc2dd, #f28ba8);}
.big-btn.leaf{background:linear-gradient(135deg, #a5e3d3, #6fc9b5);}
.big-btn.ghost{
  background:var(--paper); color:var(--ink); box-shadow:var(--shadow-soft);
  border:1.5px solid rgba(255,255,255,.9);
}
.big-btn small{display:block; font-weight:600; font-size:11.5px; opacity:.9; margin-top:2px;}

.section-label{
  font-size:13px; font-weight:800; color:var(--ink-soft); margin:18px 8px 4px;
  letter-spacing:.08em;
}

/* ---------- level / stage grids ---------- */
.grid{display:grid; grid-template-columns:repeat(2,1fr); gap:12px; margin:10px 4px;}
.tile{
  background:var(--paper); border-radius:20px; padding:14px 10px; text-align:center;
  box-shadow:var(--shadow-soft); border:1.5px solid rgba(255,255,255,.9); position:relative;
}
.tile .lv{font-size:22px; font-weight:900; color:var(--grape-dark);}
.tile .name{font-size:12px; color:var(--ink-soft); margin-top:2px;}
.tile .crown{position:absolute; top:-10px; right:-6px; font-size:22px; filter:drop-shadow(0 2px 2px rgba(150,110,170,.3));}
.tile .prog{
  margin-top:8px; height:6px; border-radius:6px; background:#efe9f8; overflow:hidden;
}
.tile .prog i{display:block; height:100%; background:linear-gradient(90deg,#a5e3d3,#7dd3c0);}
.tile.locked{opacity:.45;}

/* ---------- mode select ---------- */
.mode-card{
  display:flex; align-items:center; gap:12px;
  background:var(--paper); border-radius:20px; padding:16px 14px; margin:12px 4px;
  box-shadow:var(--shadow-soft); border:1.5px solid rgba(255,255,255,.9);
}
.mode-card .ico{font-size:30px;}
.mode-card .txt b{font-size:15px;}
.mode-card .txt div{font-size:12px; color:var(--ink-soft); margin-top:2px;}

/* ---------- quiz screen ---------- */
.quiz-top{display:flex; align-items:center; gap:8px; padding:14px 16px 0;}
.quiz-progress-bg{flex:1; height:10px; background:rgba(255,255,255,.75); border-radius:8px; overflow:hidden; box-shadow:inset 0 1px 3px rgba(150,110,170,.18);}
.quiz-progress-fill{height:100%; background:linear-gradient(90deg,#a5e3d3,#7dd3c0); transition:width .3s;}
.combo-badge{
  font-size:12px; font-weight:800; color:#fff; background:linear-gradient(135deg,#fbc2dd,#f28ba8);
  padding:4px 12px; border-radius:20px; white-space:nowrap;
}
.quiz-card{
  background:var(--paper); border-radius:26px; box-shadow:var(--shadow-soft);
  border:1.5px solid rgba(255,255,255,.9);
  margin:16px 8px; padding:28px 18px; text-align:center; position:relative; min-height:180px;
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px;
}
.quiz-card .qword{font-size:30px; font-weight:900; color:var(--ink); font-family:var(--font-en); letter-spacing:.01em;}
.quiz-card .qphon{font-size:14px; color:var(--ink-soft);}
.quiz-card .qjp{font-size:24px; font-weight:800;}
.speak-btn{
  position:absolute; top:12px; right:12px; width:40px; height:40px; border-radius:50%;
  background:linear-gradient(135deg,#bcd8fd,#93c5fd); color:#fff; font-size:16px; display:flex; align-items:center; justify-content:center;
  box-shadow:0 4px 0 rgba(120,140,200,.3);
}
.speak-btn:active{transform:translateY(3px); box-shadow:none;}

.choices{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin:6px 8px;}
.choice-btn{
  background:var(--paper); border-radius:18px; padding:16px 8px; font-size:15px; font-weight:700;
  box-shadow:var(--shadow-soft); border:1.5px solid rgba(255,255,255,.9); transition:transform .08s;
  color:var(--ink);
}
.choice-btn:active{transform:scale(.96);}
.choice-btn.correct{background:linear-gradient(135deg,#a5e3d3,#6fc9b5); color:#fff; border-color:transparent;}
.choice-btn.wrong{background:linear-gradient(135deg,#fbc2dd,#f28ba8); color:#fff; border-color:transparent;}

.oxrow{display:flex; gap:16px; margin:10px 12px;}
.ox-btn{
  flex:1; padding:26px 0; border-radius:24px; font-size:34px; font-weight:900; color:#fff;
  box-shadow:0 6px 0 rgba(150,110,170,.22);
}
.ox-btn:active{transform:translateY(5px); box-shadow:none;}
.ox-btn.o{background:linear-gradient(135deg,#a5e3d3,#6fc9b5);}
.ox-btn.x{background:linear-gradient(135deg,#fbc2dd,#f28ba8);}

.spell-row{display:flex; flex-wrap:wrap; justify-content:center; gap:9px; margin:16px 10px; min-height:60px;}
.spell-slot{
  width:46px; height:54px; border-radius:14px; background:#fff; border:3px dashed #cfc3e8;
  display:flex; align-items:center; justify-content:center; font-size:24px; font-weight:800;
}
.spell-slot.filled{border-style:solid; border-color:var(--grape); background:#f5f0ff;}
.letter-bank{display:flex; flex-wrap:wrap; justify-content:center; gap:10px; margin:10px 10px 4px;}
.letter-tile{
  width:52px; height:58px; border-radius:16px; background:var(--paper); font-size:24px; font-weight:800;
  color:var(--ink);
  box-shadow:var(--shadow-soft); border:1.5px solid rgba(255,255,255,.9);
}
.letter-tile.used{opacity:.25; pointer-events:none;}
.letter-tile:active{transform:scale(.92);}

/* ---------- feedback flash ---------- */
.flash-msg{
  text-align:center; font-weight:900; font-size:18px; height:26px; margin:2px 0;
}
.flash-msg.ok{color:var(--leaf);}
.flash-msg.ng{color:var(--coral);}

/* ---------- result screen ---------- */
.rank-badge{
  width:120px; height:120px; border-radius:50%; margin:16px auto; display:flex; align-items:center; justify-content:center;
  font-size:56px; font-weight:900; color:#fff; box-shadow:var(--shadow-soft);
  background:conic-gradient(#f9a8c9, #c084fc, #93c5fd, #7dd3c0, #f9a8c9);
}
.result-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin:14px 4px;}
.result-item{background:var(--paper); border-radius:14px; padding:12px; text-align:center; box-shadow:var(--shadow-soft);}
.result-item b{font-size:18px; display:block; color:var(--grape);}
.result-item span{font-size:11px; color:var(--ink-soft);}

/* ---------- wrong list ---------- */
.wrong-item{
  display:flex; justify-content:space-between; align-items:center;
  background:var(--paper); border-radius:14px; padding:10px 14px; margin:8px 4px; box-shadow:var(--shadow-soft);
}
.wrong-item .w-en{font-weight:800;}
.wrong-item .w-jp{font-size:12px; color:var(--ink-soft);}
.wrong-item .w-tag{font-size:10px; background:#e7ecfb; padding:2px 8px; border-radius:10px; color:var(--ink-soft);}

/* ---------- settings modal ---------- */
.modal-bg{
  position:fixed; inset:0; background:rgba(20,10,40,.55); display:flex; align-items:flex-end; justify-content:center; z-index:50;
}
.modal-sheet{
  background:var(--paper); width:100%; max-width:520px; border-radius:24px 24px 0 0; padding:20px; max-height:82vh; overflow-y:auto;
  animation:sheetUp .3s cubic-bezier(.2,.9,.3,1.1);
}
@keyframes sheetUp{from{transform:translateY(40px); opacity:0;} to{transform:translateY(0); opacity:1;}}
.modal-sheet h3{margin:0 0 12px;}
.set-row{display:flex; align-items:center; justify-content:space-between; padding:12px 0; border-bottom:1px solid rgba(0,0,0,.06);}
.switch{width:46px; height:26px; border-radius:20px; background:#ddd; position:relative; transition:.2s;}
.switch.on{background:var(--leaf);}
.switch::after{content:""; position:absolute; top:2px; left:2px; width:22px; height:22px; border-radius:50%; background:#fff; transition:.2s; box-shadow:0 1px 3px rgba(0,0,0,.3);}
.switch.on::after{left:22px;}
.danger-btn{color:var(--coral); font-weight:700; padding:12px 0;}
.close-sheet{width:100%; text-align:center; padding:12px; font-weight:800; color:var(--ink-soft);}

/* ---------- toast ---------- */
#toast{
  position:fixed; left:50%; bottom:26px; transform:translateX(-50%) translateY(20px);
  background:var(--ink); color:#fff; padding:10px 18px; border-radius:20px; font-size:13px;
  opacity:0; transition:.3s; z-index:80; pointer-events:none; white-space:nowrap;
}
#toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

/* ---------- confetti canvas ---------- */
#confetti-canvas{position:fixed; inset:0; pointer-events:none; z-index:60;}

/* ---------- fab settings ---------- */
.fab{
  position:fixed; right:16px; bottom:16px; width:52px; height:52px; border-radius:50%;
  background:var(--paper); box-shadow:var(--shadow-pop); font-size:20px; display:flex; align-items:center; justify-content:center; z-index:20;
}
.fab:active{transform:scale(.92);}

@media (prefers-reduced-motion: reduce){
  .screen{animation:none;}
  *{transition:none !important;}
}
</style>
</head>
<body>
<div id="app"></div>
<div id="toast"></div>
<canvas id="confetti-canvas"></canvas>

/* ==========================================================================
   ストレージ層
   ========================================================================== */
const Store = (() => {
  const KEY = 'corkvocab_v1';
  function def(){
    return {
      words: null, // null = use BUILTIN_WORDS
      wordMeta: {}, // no -> {correct, wrong, lastResult, cleared}
      stageProgress: {}, // "L-S" -> {seen:Set-as-array, correctSet:[]}
      xp:0, level:1, streak:0, lastStudyDate:null, totalDays:0,
      totalQ:0, totalCorrect:0, bestCombo:0,
      badges:[], titles:[],
      settings:{bgm:true, sfx:true, bgmVol:.5, sfxVol:.7, dark:false},
      wrongBook:[], // list of word no currently missed
      lastPlayed:null // {level, groupType:'stage'|'genre'|'wrong', groupKey, mode}
    };
  }
  let state = load();
  function load(){
    try{
      const raw = localStorage.getItem(KEY);
      if(!raw) return def();
      const parsed = JSON.parse(raw);
      return Object.assign(def(), parsed);
    }catch(e){ return def(); }
  }
  function save(){ localStorage.setItem(KEY, JSON.stringify(state)); }
  return {
    get(){ return state; },
    save,
    reset(keys){
      const d = def();
      if(!keys){ state = d; save(); return; }
      keys.forEach(k=> state[k] = d[k]);
      save();
    }
  };
})();

/* ==========================================================================
   レベル分け設定
   ----------------------------------------------------------------------
   各単語データには最初から「level」（そのCSVを読み込んだときに指定した
   レベル番号）が入っています。セクション番号(例:"1-31")はレベルをまたいで
   重複することがあるため、レベル判定には使わず、常にこの level フィールド
   をそのまま使います。

   新しいCSVを設定画面からインポートする際は、そのCSV全体をレベル1〜5の
   どれにするか選ぶダイアログが出て、その番号がそのままここに保存されます。
   ========================================================================== */
const PLANNED_LEVEL_COUNT = 5; // ホーム画面のレベル一覧に「準備中」として表示する数
function classifyLevel(w){ return w.level || 1; }

/* ==========================================================================
   単語データアクセス
   ========================================================================== */
function getWords(){
  const s = Store.get();
  const base = (s.words && s.words.length) ? s.words : BUILTIN_WORDS;
  return base.map(w => ({...w, level: classifyLevel(w)}));
}
function allLevelIds(){
  const present = [...new Set(getWords().map(w=>w.level))];
  const maxPresent = present.length ? Math.max(...present) : 0;
  const upper = Math.max(PLANNED_LEVEL_COUNT, maxPresent);
  return Array.from({length:upper}, (_,i)=>i+1);
}
function wordsByLevel(level){ return getWords().filter(w=>w.level===level); }
function wordsByStage(level, section){ return getWords().filter(w=>w.level===level && w.section===section); }
function stagesOfLevel(level){
  const set = [...new Set(wordsByLevel(level).map(w=>w.section))];
  set.sort((a,b)=>{
    const [sa,na] = a.split('-').map(Number), [sb,nb] = b.split('-').map(Number);
    return (sa-sb) || (na-nb);
  });
  return set;
}
function levels(){ return allLevelIds().filter(lv=>wordsByLevel(lv).length>0); }
function unclassifiedWords(){ return getWords().filter(w=>!w.level || w.level<1); }

/* ---------------- 品詞（ジャンル）別モード ---------------- */
const GENRE_DEFS = [
  {key:'名', label:'名詞編', emoji:'📕'},
  {key:'動', label:'動詞編', emoji:'🏃'},
  {key:'形', label:'形容詞編', emoji:'🎨'},
  {key:'副', label:'副詞編', emoji:'✨'},
  {key:'前', label:'前置詞編', emoji:'📍'},
  {key:'代', label:'代名詞編', emoji:'🔁'},
  {key:'接', label:'接続詞編', emoji:'🔗'},
  {key:'助', label:'助動詞編', emoji:'🧩'},
  {key:'間', label:'間投詞編', emoji:'💬'},
];
// 品詞が複合的な単語（例:「動・名」）は、該当するすべてのジャンルに登場します。
function wordsByGenre(level, key){ return wordsByLevel(level).filter(w => (w.pos||'').includes(key)); }
function genresWithData(level){ return GENRE_DEFS.filter(g=>wordsByGenre(level, g.key).length>0); }
function genreProgressPct(level, key){
  const words = wordsByGenre(level, key);
  if(!words.length) return 0;
  const s = Store.get();
  const c = words.filter(w=>(s.wordMeta[w.no]||{}).lastResult==='correct').length;
  return Math.round(c/words.length*100);
}

/* ---------------- 学習グループ（ステージ or ジャンル or 苦手）共通ヘルパー ---------------- */
function getGroupWords(level, groupType, groupKey){
  if(groupType==='stage') return wordsByStage(level, groupKey);
  if(groupType==='genre') return wordsByGenre(level, groupKey);
  if(groupType==='wrong') return getWords().filter(w=>Store.get().wrongBook.includes(w.no));
  return [];
}
function getGroupLabel(groupType, groupKey){
  if(groupType==='stage') return groupKey;
  if(groupType==='genre'){ const g=GENRE_DEFS.find(g=>g.key===groupKey); return g ? g.label : groupKey; }
  if(groupType==='wrong') return '苦手克服';
  return groupKey;
}

/* ==========================================================================
   進捗 / XP / バッジ
   ========================================================================== */
function meta(no){
  const s = Store.get();
  if(!s.wordMeta[no]) s.wordMeta[no] = {correct:0, wrong:0, lastResult:null};
  return s.wordMeta[no];
}
function stageKey(level, section){ return level+'_'+section; }
function stageProgressPct(level, section){
  const words = wordsByStage(level, section);
  if(!words.length) return 0;
  const s = Store.get();
  const clearedCount = words.filter(w => (s.wordMeta[w.no]||{}).lastResult === 'correct').length;
  return Math.round(clearedCount/words.length*100);
}
function levelProgressPct(level){
  const words = wordsByLevel(level);
  if(!words.length) return 0;
  const s = Store.get();
  const c = words.filter(w=>(s.wordMeta[w.no]||{}).lastResult==='correct').length;
  return Math.round(c/words.length*100);
}
function xpForLevel(lv){ return 50 * lv * lv; } // needed cumulative xp for reaching lv+1 roughly
function computeLevel(xp){
  let lv=1;
  while(xp >= xpForLevel(lv)) lv++;
  return lv;
}
function addXP(amount){
  const s = Store.get();
  const before = computeLevel(s.xp);
  s.xp += amount;
  const after = computeLevel(s.xp);
  Store.save();
  if(after > before){
    Sound.levelup();
    burstConfetti();
    toast('🎉 レベルアップ！ Lv.'+after);
  }
  return after > before;
}
function touchStreak(){
  const s = Store.get();
  const today = new Date().toDateString();
  if(s.lastStudyDate !== today){
    const y = new Date(); y.setDate(y.getDate()-1);

    s.totalDays += 1;
    s.lastStudyDate = today;
    Store.save();
  }
}

/* ==========================================================================
   サウンド（Web Audio APIで完結。外部音源ファイル不要）
   ========================================================================== */
const Sound = (() => {
  let ctx=null, bgmTimer=null, bgmStep=0, unlocked=false;
  function ac(){
    if(!ctx) ctx = new (window.AudioContext||window.webkitAudioContext)();
    if(ctx.state === 'suspended') ctx.resume();
    return ctx;
  }
  function unlock(){
    if(unlocked) return;
    unlocked = true;
    const c = ac();
    // 無音の短いバッファを一度再生して、iOS Safariの制限を解除する
    const buffer = c.createBuffer(1,1,22050);
    const src = c.createBufferSource();
    src.buffer = buffer; src.connect(c.destination); src.start(0);
    if(c.state === 'suspended') c.resume();
    const s = Store.get();
    if(s.settings.bgm) Sound.startBGM();
  }
  // 最初のタップ/クリックでオーディオをアンロック
  ['pointerdown','touchend','click'].forEach(ev=>{
    document.addEventListener(ev, unlock, {once:true, passive:true});
  });
  function tone(freq, dur, type='sine', vol=.2, delay=0){
    const s = Store.get(); if(!s.settings.sfx) return;
    const c = ac(); const t0 = c.currentTime+delay;
    const osc = c.createOscillator(); const gain = c.createGain();
    osc.type = type; osc.frequency.setValueAtTime(freq, t0);
    gain.gain.setValueAtTime(0, t0);
    gain.gain.linearRampToValueAtTime(vol*s.settings.sfxVol, t0+.01);
    gain.gain.exponentialRampToValueAtTime(.001, t0+dur);
    osc.connect(gain); gain.connect(c.destination);
    osc.start(t0); osc.stop(t0+dur+.02);
  }
  return {
    click(){ tone(520,.06,'square',.15); },
    correct(){ tone(660,.09,'triangle',.25); tone(880,.12,'triangle',.22,.09); },
    wrong(){ tone(180,.18,'sawtooth',.2); },
    clear(){ [523,659,784,1046].forEach((f,i)=>tone(f,.18,'triangle',.22,i*.11)); },
    levelup(){ [392,523,659,784,1046].forEach((f,i)=>tone(f,.2,'sine',.25,i*.09)); },
    startBGM(){
      const s = Store.get(); if(!s.settings.bgm) return;
      if(bgmTimer) return;
      ac(); // コンテキストを起こしておく
      const notes=[392,440,523,440,392,349,392,523];
      bgmStep=0;
      bgmTimer = setInterval(()=>{
        const st = Store.get();
        if(!st.settings.bgm){ Sound.stopBGM(); return; }
        const c = ac(); const t0=c.currentTime;
        const osc=c.createOscillator(); const gain=c.createGain();
        osc.type='sine'; osc.frequency.setValueAtTime(notes[bgmStep%notes.length],t0);
        gain.gain.setValueAtTime(0,t0);
        gain.gain.linearRampToValueAtTime(.05*st.settings.bgmVol,t0+.05);
        gain.gain.exponentialRampToValueAtTime(.001,t0+.5);
        osc.connect(gain); gain.connect(c.destination);
        osc.start(t0); osc.stop(t0+.55);
        bgmStep++;
      }, 480);
    },
    stopBGM(){ if(bgmTimer){ clearInterval(bgmTimer); bgmTimer=null; } }
  };
})();

function speak(text){
  try{
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang='en-US'; u.rate=.92;
    window.speechSynthesis.speak(u);
  }catch(e){}
}

/* ==========================================================================
   紙吹雪
   ========================================================================== */
function burstConfetti(){
  const canvas = document.getElementById('confetti-canvas');
  const ctx2 = canvas.getContext('2d');
  canvas.width = innerWidth; canvas.height = innerHeight;
  const colors=['#7c5cfc','#ff9f1c','#06d6a0','#ff5d73','#3fb8e8'];
  let parts = Array.from({length:70},()=>({
    x:innerWidth/2, y:innerHeight*.3,
    vx:(Math.random()-.5)*10, vy:Math.random()*-9-3,
    g:.35+Math.random()*.15, size:5+Math.random()*5,
    color:colors[Math.floor(Math.random()*colors.length)],
    rot:Math.random()*360, vr:(Math.random()-.5)*14, life:70+Math.random()*30
  }));
  let frame=0;
  function step(){
    frame++;
    ctx2.clearRect(0,0,canvas.width,canvas.height);
    parts.forEach(p=>{
      p.vy += p.g; p.x+=p.vx; p.y+=p.vy; p.rot+=p.vr; p.life--;
      ctx2.save(); ctx2.translate(p.x,p.y); ctx2.rotate(p.rot*Math.PI/180);
      ctx2.fillStyle=p.color; ctx2.fillRect(-p.size/2,-p.size/2,p.size,p.size*.6);
      ctx2.restore();
    });
    parts = parts.filter(p=>p.life>0 && p.y<innerHeight+40);
    if(parts.length>0 && frame<160) requestAnimationFrame(step);
    else ctx2.clearRect(0,0,canvas.width,canvas.height);
  }
  step();
}

/* ==========================================================================

   ========================================================================== */
function buildQueue(wordList){
  const arr = [...wordList];
  for(let i=arr.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]]; }
  return arr;
}
function startQuiz(level, groupType, groupKey, mode){
  const words = getGroupWords(level, groupType, groupKey);
  const label = getGroupLabel(groupType, groupKey);
  const s = Store.get(); s.lastPlayed = {level, groupType, groupKey, mode}; Store.save();
  quizState = {
    level, groupType, groupKey, label, mode, isWrongMode:false,
    queue: buildQueue(words), idx:0, correct:0, wrong:0, combo:0, maxCombo:0,
    startTime: Date.now(), missed: []
  };
  backStack = [()=>screenModeSelect(level, groupType, groupKey)];
  renderQuizStep();
}
function startWrongQuiz(mode){
  const s = Store.get();
  const words = getWords().filter(w=>s.wrongBook.includes(w.no));
  s.lastPlayed = {level:0, groupType:'wrong', groupKey:null, mode}; Store.save();
  quizState = {
    level:0, groupType:'wrong', groupKey:null, label:'苦手克服', mode, isWrongMode:true,
    queue: buildQueue(words), idx:0, correct:0, wrong:0, combo:0, maxCombo:0,
    startTime: Date.now(), missed:[]
  };
  backStack=[screenWrongOnlyPick];
  renderQuizStep();
}

function currentWord(){ return quizState.queue[quizState.idx]; }

function quizTopHtml(){
  const total = quizState.queue.length;
  const pct = Math.round(quizState.idx/total*100);
  return `<div class="quiz-top">
    <button class="back-btn" style="width:34px;height:34px;font-size:15px;" onclick="__back()">‹</button>
    <div class="quiz-progress-bg"><div class="quiz-progress-fill" style="width:${pct}%"></div></div>
    <div class="combo-badge">🔥${quizState.combo}</div>
  </div>`;
}
function skipRowHtml(){
  return `<div style="text-align:center;margin-top:4px;">
    <button class="danger-btn" style="font-weight:700;" onclick="skipQuestion()">🤔 わからない・スキップ ›</button>
  </div>`;
}
function skipQuestion(){
  const w = currentWord();
  const s = Store.get();
  // 正解・不正解にはせず、あとで復習できるよう苦手リストに入れておく
  if(!s.wrongBook.includes(w.no)) s.wrongBook.push(w.no);
  Store.save();
  quizState.combo = 0;
  quizState.skipped = (quizState.skipped||0) + 1;
  Sound.click();
  quizState.idx++;
  renderQuizStep();
}

function renderQuizStep(){
  if(quizState.idx >= quizState.queue.length){ return finishQuiz(); }
  const w = currentWord();
  if(quizState.mode==='e2j') return renderE2J(w);
  if(quizState.mode==='spell') return renderSpell(w);
  if(quizState.mode==='ox') return renderOX(w);
}

function pickDistractors(w, count){
  const pool = getWords().filter(o=>o.no!==w.no && o.meaning!==w.meaning);
  const shuffled = buildQueue(pool);
  return shuffled.slice(0,count).map(o=>o.meaning);
}

function renderE2J(w){
  const opts = buildQueue([w.meaning, ...pickDistractors(w,3)]);
  render(`
    ${quizTopHtml()}
    <div class="quiz-card">
      <button class="speak-btn" onclick="speak('${w.word.replace(/'/g,"\\'")}')">🔊</button>
      <div class="qword">${w.word}</div>
      <div class="qphon">${w.phon}</div>
    </div>
    <div class="flash-msg" id="flash"></div>
    <div class="choices">
      ${opts.map(o=>`<button class="choice-btn" onclick="answerChoice(this,'${o.replace(/'/g,"\\'")}','${w.meaning.replace(/'/g,"\\'")}')">${o}</button>`).join('')}
    </div>
    ${skipRowHtml()}
  `);
}
function answerChoice(btn, chosen, correctAns){
  document.querySelectorAll('.choice-btn').forEach(b=>b.onclick=null);
  const ok = chosen===correctAns;
  document.querySelectorAll('.choice-btn').forEach(b=>{
    if(b.textContent===correctAns) b.classList.add('correct');
    else if(b===btn) b.classList.add('wrong');
  });
  settleAnswer(ok);
}

function renderOX(w){
  const showTrue = Math.random()<0.5;
  let displayMeaning = w.meaning;
  if(!showTrue){
    const others = pickDistractors(w,1);
    displayMeaning = others[0] || w.meaning;
  }
  render(`
    ${quizTopHtml()}
    <div class="quiz-card">
      <button class="speak-btn" onclick="speak('${w.word.replace(/'/g,"\\'")}')">🔊</button>
      <div class="qword">${w.word}</div>
      <div class="qphon">${w.phon}</div>
      <div class="qjp">${displayMeaning}</div>
    </div>
    <div class="flash-msg" id="flash"></div>
    <div class="oxrow">
      <button class="ox-btn o" onclick="answerOX(true, ${showTrue})">○</button>
      <button class="ox-btn x" onclick="answerOX(false, ${showTrue})">✕</button>
    </div>
    ${skipRowHtml()}
  `);
}
function answerOX(userSaysTrue, actuallyTrue){
  document.querySelectorAll('.ox-btn').forEach(b=>b.onclick=null);
  settleAnswer(userSaysTrue===actuallyTrue);
}

function randomDecoyLetters(count){
  const alphabet = 'abcdefghijklmnopqrstuvwxyz'.split('');
  const picks = [];
  for(let i=0;i<count;i++) picks.push(alphabet[Math.floor(Math.random()*alphabet.length)]);
  return picks;
}
function renderSpell(w){
  const target = w.word.split(',')[0].trim().toLowerCase().replace(/[^a-z']/g,'');
  const letters = target.replace(/'/g,'').split('');
  const decoyCount = 2 + Math.floor(Math.random()*2); // 2〜3個、関係ない文字を混ぜる
  const bankLetters = [...letters, ...randomDecoyLetters(decoyCount)];
  const shuffled = buildQueue(bankLetters.map((c,i)=>({c,i})));
  quizState.spell = {target, filled:new Array(target.replace(/'/g,'').length).fill(null), bank:shuffled, usedIdx:new Set()};
  render(`
    ${quizTopHtml()}
    <div class="quiz-card">
      <button class="speak-btn" onclick="speak('${w.word.replace(/'/g,"\\'")}')">🔊</button>
      <div class="qjp">${w.meaning}</div>
      <div class="qphon">${w.phon}</div>
    </div>
    <div class="flash-msg" id="flash"></div>
    <div class="spell-row" id="spellRow"></div>
    <div class="letter-bank" id="letterBank"></div>
    <div style="text-align:center;margin-top:6px;">
      <button class="big-btn ghost" style="display:inline-block;width:auto;padding:10px 24px;" onclick="clearSpell()">🔄 やり直す</button>
    </div>
    ${skipRowHtml()}
  `);
  renderSpellUI(w);
}
function renderSpellUI(w){
  const { filled, bank, usedIdx } = quizState.spell;
  const target = quizState.spell.target.replace(/'/g,'');
  document.getElementById('spellRow').innerHTML = filled.map((c,i)=>
    `<div class="spell-slot ${c?'filled':''}">${c || ''}</div>`
  ).join('');
  document.getElementById('letterBank').innerHTML = bank.map((item,bi)=>
    `<button class="letter-tile ${usedIdx.has(bi)?'used':''}" onclick="pickLetter(${bi})">${item.c.toUpperCase()}</button>`
  ).join('');
  if(!filled.includes(null)){
    const answer = filled.join('');
    setTimeout(()=> settleAnswer(answer===target), 200);
  }
}
function pickLetter(bi){
  const st = quizState.spell;
  if(st.usedIdx.has(bi)) return;
  const emptyIdx = st.filled.indexOf(null);
  if(emptyIdx===-1) return;
  st.filled[emptyIdx] = st.bank[bi].c;
  st.usedIdx.add(bi);
  Sound.click();
  renderSpellUI(currentWord());
}
function clearSpell(){
  const st = quizState.spell;
  st.filled = st.filled.map(()=>null);
  st.usedIdx = new Set();
  renderSpellUI(currentWord());
}

function settleAnswer(isCorrect){
  const w = currentWord();
  const m = meta(w.no);
  const flash = document.getElementById('flash');
  touchStreak();
  const s = Store.get();
  s.totalQ++;
  if(isCorrect){
    Sound.correct();
    m.correct++; m.lastResult='correct';
    quizState.correct++; quizState.combo++;
    quizState.maxCombo = Math.max(quizState.maxCombo, quizState.combo);
    s.totalCorrect++;
    s.bestCombo = Math.max(s.bestCombo, quizState.combo);
    const bonus = 10 + Math.min(quizState.combo*2, 20);
    addXP(bonus);
    // 苦手リストから除外
    s.wrongBook = s.wrongBook.filter(no=>no!==w.no);
    if(flash){ flash.textContent='せいかい！🎉'; flash.className='flash-msg ok'; }
  }else{
    Sound.wrong();
    m.wrong++; m.lastResult='wrong';
    quizState.wrong++; quizState.combo=0;
    quizState.missed.push(w.no);
    if(!s.wrongBook.includes(w.no)) s.wrongBook.push(w.no);
    if(flash){ flash.textContent='正解: '+w.meaning; flash.className='flash-msg ng'; }
  }
  Store.save();
  checkBadges();
  setTimeout(()=>{
    quizState.idx++;
    renderQuizStep();
  }, 850);
}

function finishQuiz(){
  Sound.clear();
  if(quizState.correct === quizState.queue.length && quizState.queue.length>0){
    burstConfetti();
  }
  const total = quizState.queue.length;
  const acc = total? Math.round(quizState.correct/total*100) : 0;
  let rank = 'D';
  if(acc>=95) rank='S'; else if(acc>=85) rank='A'; else if(acc>=70) rank='B'; else if(acc>=50) rank='C';
  const timeSec = Math.round((Date.now()-quizState.startTime)/1000);
  const perfectClear = acc===100;

  backStack = [screenHome];
  render(`
    <div class="hero" style="color:var(--ink);">
      <h1 style="color:var(--ink); text-shadow:none;">${quizState.label} の結果</h1>
    </div>
    <div class="rank-badge">${rank}</div>
    ${perfectClear ? '<p style="text-align:center;font-weight:800;color:var(--leaf);">🌟 完全クリア！ 👑</p>' : ''}
    <div class="result-grid">
      <div class="result-item"><b>${quizState.correct}</b><span>正解数</span></div>
      <div class="result-item"><b>${quizState.wrong}</b><span>不正解数</span></div>
      <div class="result-item"><b>${acc}%</b><span>正答率</span></div>
      <div class="result-item"><b>${timeSec}秒</b><span>学習時間</span></div>
      <div class="result-item"><b>${quizState.maxCombo}</b><span>最高コンボ</span></div>
      <div class="result-item"><b>${quizState.skipped||0}</b><span>スキップ数</span></div>
    </div>
    ${quizState.missed.length ? `<button class="big-btn tangerine" onclick="reviewMissed()">🔁 間違えた問題を復習</button>` : ''}
    <button class="big-btn grape" onclick="go(screenLevelSelect)">📌 レベル選択へ</button>
    <button class="big-btn ghost" onclick="go(screenHome)">🏠 ホームへ戻る</button>
  `);
}
function reviewMissed(){
  const missedWords = getWords().filter(w=>quizState.missed.includes(w.no));
  const mode = quizState.mode;
  quizState = {
    level:quizState.level, groupType:quizState.groupType, groupKey:quizState.groupKey,
    label:quizState.label+'（復習）', mode, isWrongMode:true,
    queue: buildQueue(missedWords), idx:0, correct:0, wrong:0, combo:0, maxCombo:0,
    startTime: Date.now(), missed:[]
  };
  renderQuizStep();
}

/* ==========================================================================
   設定モーダル
   ========================================================================== */
function openSettings(){
  const s = Store.get();
  const modal = document.createElement('div');
  modal.className='modal-bg';
  modal.id='settingsModal';
  modal.innerHTML = `
    <div class="modal-sheet">
      <h3>⚙️ 設定</h3>
      <div class="set-row"><span>BGM</span><div class="switch ${s.settings.bgm?'on':''}" onclick="toggleSetting('bgm', this)"></div></div>
      <div class="set-row"><span>効果音</span><div class="switch ${s.settings.sfx?'on':''}" onclick="toggleSetting('sfx', this)"></div></div>
      <div class="set-row"><span>ダークモード</span><div class="switch ${s.settings.dark?'on':''}" onclick="toggleSetting('dark', this)"></div></div>
      <div class="set-row"><span>CSVをインポート（単語データ更新）</span>
        <label class="big-btn ghost" style="width:auto;padding:8px 14px;margin:0;display:inline-block;">
          選択<input type="file" accept=".csv" style="display:none" onchange="importCSV(event)">
        </label>
      </div>
      <div class="set-row" style="flex-direction:column;align-items:flex-start;gap:8px;">
        <span>データ管理</span>
        <button class="danger-btn" onclick="confirmReset(['wordMeta','stageProgress','wrongBook'],'学習履歴')">学習履歴をリセット</button>
        <button class="danger-btn" onclick="confirmReset(['xp'],'XP')">XPをリセット</button>
        <button class="danger-btn" onclick="confirmReset(['wrongBook'],'苦手リスト')">苦手リストを削除</button>
        <button class="danger-btn" onclick="confirmReset(null,'全データ')">全データを初期化</button>
      </div>
      <button class="close-sheet" onclick="closeSettings()">閉じる</button>
    </div>`;
  document.body.appendChild(modal);
}
function closeSettings(){ const m=document.getElementById('settingsModal'); if(m) m.remove(); }
function toggleSetting(key, el){
  const s = Store.get();
  s.settings[key] = !s.settings[key];
  Store.save();
  el.classList.toggle('on');
  if(key==='dark') document.documentElement.setAttribute('data-theme', s.settings.dark?'dark':'light');
  if(key==='bgm'){ s.settings.bgm ? Sound.startBGM() : Sound.stopBGM(); }
}
function confirmReset(keys, label){
  closeSettings();
  showConfirm(label+'を削除します。よろしいですか？（元に戻せません）', ()=>{
    Store.reset(keys);
    toast(label+'をリセットしました');
    screenHome();
  });
}
function showConfirm(message, onYes){
  const modal = document.createElement('div');
  modal.className='modal-bg';
  modal.id='confirmModal';
  modal.innerHTML = `<div class="modal-sheet">
    <h3>⚠️ 確認</h3>
    <p>${message}</p>
    <button class="big-btn" style="background:linear-gradient(180deg,#ff8a9c,var(--coral));color:#fff;" onclick="__confirmYes()">削除する</button>
    <button class="close-sheet" onclick="__confirmNo()">キャンセル</button>
  </div>`;
  document.body.appendChild(modal);
  window.__confirmYesFn = onYes;
}
window.__confirmYes = function(){
  const m = document.getElementById('confirmModal'); if(m) m.remove();
  const fn = window.__confirmYesFn; window.__confirmYesFn = null;
  if(fn) fn();
};
window.__confirmNo = function(){
  const m = document.getElementById('confirmModal'); if(m) m.remove();
  window.__confirmYesFn = null;
};
let pendingImport = null;
function importCSV(evt){
  const file = evt.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = e=>{
    try{
      const lines = e.target.result.split(/\r?\n/).filter(l=>l.trim());
      const rows = lines.slice(1).map(parseCSVLine);
      const parsed = rows.map(r=>{
        const [section, no, word, phon, pos, meaning] = r;
        const [setNum, stageNum] = section.split('-').map(Number);
        return {no:parseInt(no), section, set:setNum, stage:stageNum, word, phon, pos, meaning};
      }).filter(w=>w.word);
      if(!parsed.length){ toast('CSVから単語が読み取れませんでした'); return; }
      pendingImport = parsed;
      askImportLevel();
    }catch(err){ toast('CSVの読み込みに失敗しました'); }
  };
  reader.readAsText(file, 'UTF-8');
  evt.target.value = ''; // 同じファイルを選び直せるようにする
}
function askImportLevel(){
  const modal = document.createElement('div');
  modal.className='modal-bg';
  modal.id='importLevelModal';
  const btnColors = ['grape','tangerine','leaf','grape','tangerine'];
  const buttons = [1,2,3,4,5].map((lv,i)=>
    `<button class="big-btn ${btnColors[i]}" onclick="confirmImportLevel(${lv})">レベル${lv} として追加</button>`
  ).join('');
  modal.innerHTML = `<div class="modal-sheet">
    <h3>📥 CSVの読み込み</h3>
    <p>このCSV（${pendingImport.length}語）をどのレベルとして追加しますか？<br>
    同じ番号(no)の単語が既にある場合は上書きされます。</p>
    ${buttons}
    <button class="close-sheet" onclick="cancelImport()">キャンセル</button>
  </div>`;
  document.body.appendChild(modal);
}
function confirmImportLevel(level){
  if(!pendingImport) return;
  const s = Store.get();
  const existing = s.words ? s.words : BUILTIN_WORDS.map(w=>({...w}));
  const map = {}; existing.forEach(w=>map[w.no]=w);
  pendingImport.forEach(w=>{ map[w.no] = {...w, level:level}; }); // このCSVは丸ごと指定レベルに割り当て
  s.words = Object.values(map).sort((a,b)=>a.no-b.no);
  Store.save();
  const count = pendingImport.length;
  pendingImport = null;
  document.getElementById('importLevelModal')?.remove();
  toast('レベル'+level+'として '+count+'語を取り込みました');
  closeSettings();
  screenHome();
}
function cancelImport(){
  pendingImport = null;
  document.getElementById('importLevelModal')?.remove();
}
function parseCSVLine(line){
  const out=[]; let cur=''; let inQ=false;
  for(let i=0;i<line.length;i++){
    const c = line[i];
    if(c==='"'){ inQ = !inQ; continue; }
    if(c===',' && !inQ){ out.push(cur); cur=''; continue; }
    cur+=c;
  }
  out.push(cur);
  return out;
}

/* ==========================================================================
   初期化
   ========================================================================== */
/* ==========================================================================
   ジェスチャー封じ込め（Safariのピンチズーム・ダブルタップズーム対策）
   ========================================================================== */
document.addEventListener('gesturestart', e => e.preventDefault());
document.addEventListener('gesturechange', e => e.preventDefault());
let __lastTouchEnd = 0;
document.addEventListener('touchend', e => {
  const now = Date.now();
  if(now - __lastTouchEnd <= 300) e.preventDefault();
  __lastTouchEnd = now;
}, {passive:false});
document.addEventListener('touchmove', e => {
  if(e.touches.length > 1) e.preventDefault(); // 2本指でのピンチ操作をブロック
}, {passive:false});

function initApp(){
  const s = Store.get();
  document.documentElement.setAttribute('data-theme', s.settings.dark?'dark':'light');
  screenHome();
}
initApp();
</script>
